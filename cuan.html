<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>narazaen official</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Background gradasi langit ke rumput */
            background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 50%, #52af21 50%, #2e7d32 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Tambahan efek awan sederhana */
        body::before {
            content: "☁️";
            position: absolute;
            top: 10%;
            left: 10%;
            font-size: 50px;
            opacity: 0.5;
            animation: cloudMove 20s linear infinite;
        }

        @keyframes cloudMove {
            from { transform: translateX(-100px); }
            to { transform: translateX(110vw); }
        }

        .container {
            width: 85%;
            max-width: 450px;
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 1;
            border: 4px solid #fff;
        }

        h3 {
            color: #2e7d32;
            margin-bottom: 10px;
            font-weight: 700;
        }

        /* Wadah Garis Loading - Tema Kayu/Tanah */
        .loading-bar-container {
            width: 100%;
            height: 12px;
            background-color: #8d6e63;
            border-radius: 10px;
            position: relative;
            margin: 40px 0 20px 0;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Garis yang berjalan - Warna Daun */
        .progress-line {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #aed581, #4caf50);
            border-radius: 10px;
            position: absolute;
            animation: progressAnim 10s ease-in-out forwards;
        }

        /* Karakter Kelinci */
        .rabbit {
            position: absolute;
            right: -20px;
            top: -35px;
            font-size: 32px;
            transform: scaleX(-1);
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.1));
        }

        @keyframes progressAnim {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .status {
            margin-top: 15px;
            font-size: 14px;
            color: #444;
            line-height: 1.6;
            background: #f1f8e9;
            padding: 10px;
            border-radius: 10px;
            border-left: 5px solid #4caf50;
        }

        .footer-note {
            font-size: 11px;
            color: #888;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h3>Sabar ya, lagi otw... 🌿</h3>
        <p style="color: #666; font-size: 14px;">Kelinci kami sedang berlari menuju lokasi</p>
        
        <div class="loading-bar-container">
            <div class="progress-line">
                <span class="rabbit">🐇</span>
            </div>
        </div>

        <div class="status">
            <strong>Narazaen Anti Hoax:</strong><br>
            Mainkan game hingga level 60, kamu bisa tarik tunai 150k dan dibayar tiap hari 3k!
        </div>
        
        <p class="footer-note">jangan sampe ga download pokoknya</p>
    </div>

    <script>
        // Link tujuan
        const urlTujuan = "https://dosr1htjv377z.cloudfront.net/invite.id.html?code=8jo68";

        // Redirect setelah animasi selesai (10.2 detik)
        setTimeout(() => {
            window.location.replace(urlTujuan);
        }, 10200);
    </script>

</body>
</html>
